name: Daily Nigeria News Video

on:
  schedule:
    # 3 runs/day, each uploading 2 videos (landscape + Shorts) = 6 uploads/day,
    # staying under YouTube's 10,000-unit free daily quota (1,600 units/upload).
    - cron: "0 7 * * *"    # 8:00 AM WAT
    - cron: "0 17 * * *"   # 6:00 PM WAT
    - cron: "0 20 * * *"   # 9:00 PM WAT
  workflow_dispatch: {}   # lets you trigger it manually from the GitHub app/website

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (ffmpeg + imagemagick for video/captions)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core

      - name: Relax ImageMagick's text policy
        run: |
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/rights="none" pattern="text"/rights="read|write" pattern="text"/' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the pipeline (fetch, script, voice, images, video, upload)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          python main.py --count 1 --upload

      - name: Upload video as workflow artifact (backup / manual review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nigeria-news-video-${{ github.run_number }}
          path: |
            output/videos/*.mp4
            output/thumbnails/*.jpg
          retention-days: 7

      - name: Commit updated headlines.json back to repo
        if: always()
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add output/data/headlines.json
          git diff --cached --quiet || git commit -m "Update headlines [skip ci]"
          git pull --rebase origin main
          git push
